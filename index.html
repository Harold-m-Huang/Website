<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ AI Prompt 終端母體寶庫</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Matrix 核心配色 */
    --bg-main: #05070B;       /* 純粹暗黑底色 */
    --bg-card: #0D1117;       /* 終端機卡片黑 */
    --bg-input: #0A0D14;      /* 輸入框暗黑 */
    --border-color: #1A241E;  /* 帶有微綠的暗色邊框 */
    
    /* 經典駭客綠系列 */
    --matrix-green: #00FF66;       /* 高亮螢光綠 */
    --matrix-green-dim: #00CC52;   /* 次要綠 */
    --matrix-green-glow: #003314;  /* 螢光微光 */
    
    --text-primary: #E2E8F0;
    --text-secondary: #8492A6;
    --text-muted: #4A5768;
  }

  body {
    font-family: 'Noto Sans TC', 'Plus Jakarta Sans', sans-serif;
    background-color: var(--bg-main);
    color: var(--text-primary);
    min-height: 100vh;
    /* 模擬母體的微弱綠色數位射線感 */
    background-image: 
      radial-gradient(at 50% 0%, rgba(0, 255, 102, 0.03) 0px, transparent 60%),
      radial-gradient(at 0% 100%, rgba(0, 255, 102, 0.01) 0px, transparent 40%);
  }

  .top-bar {
    padding: 60px 24px 0;
    text-align: center;
  }

  .site-title {
    font-family: 'Fira Code', 'Noto Sans TC', monospace;
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 12px;
    color: var(--matrix-green);
    text-shadow: 0 0 12px rgba(0, 255, 102, 0.4);
  }

  .sheet-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-secondary);
    text-decoration: none;
    margin-bottom: 32px;
    transition: color 0.2s;
  }
  .sheet-link:hover { 
    color: var(--matrix-green);
    text-shadow: 0 0 8px rgba(0, 255, 102, 0.3);
  }
  .sheet-link svg { width: 14px; height: 14px; }

  .search-wrap {
    max-width: 560px;
    margin: 0 auto 32px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    width: 18px;
    height: 18px;
  }

  #searchInput {
    width: 100%;
    padding: 14px 16px 14px 48px;
    font-size: 15px;
    font-family: inherit;
    border: 1.5px solid var(--border-color);
    border-radius: 8px; /* 改為更有科技棱角感的微圓角 */
    background: var(--bg-input);
    color: var(--matrix-green);
    outline: none;
    transition: all 0.2s;
  }
  #searchInput:focus {
    border-color: var(--matrix-green);
    box-shadow: 0 0 15px rgba(0, 255, 102, 0.15);
  }
  #searchInput::placeholder { color: var(--text-muted); }

  .category-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    padding: 0 24px 40px;
    max-width: 900px;
    margin: 0 auto;
  }

  .cat-btn {
    padding: 8px 20px;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 500;
    border: 1.5px solid var(--border-color);
    background: var(--bg-card);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
  }
  .cat-btn:hover {
    border-color: var(--matrix-green);
    color: var(--matrix-green);
  }
  .cat-btn.active {
    background: var(--matrix-green-glow);
    border-color: var(--matrix-green);
    color: var(--matrix-green);
    box-shadow: 0 0 10px rgba(0, 255, 102, 0.1);
  }

  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 60px;
  }

  .section {
    margin-bottom: 48px;
  }

  .section-title {
    font-family: 'Fira Code', monospace;
    font-size: 1.2rem;
    font-weight: 700;
    color: #FFFFFF;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-left: 3px solid var(--matrix-green);
    padding-left: 12px;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
  }

  .prompt-card {
    background: var(--bg-card);
    border-radius: 8px;
    border: 1.5px solid var(--border-color);
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  .prompt-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--matrix-green);
    opacity: 0.4;
  }
  .prompt-card:hover {
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.7), 0 0 20px rgba(0, 255, 102, 0.1);
    transform: translateY(-4px);
    border-color: var(--matrix-green);
  }
  .prompt-card:hover::before {
    opacity: 1;
  }

  .card-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    width: fit-content;
    text-transform: uppercase;
    font-family: 'Fira Code', monospace;
  }

  .card-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.4;
  }

  .card-body {
    font-size: 13.5px;
    color: var(--text-secondary);
    line-height: 1.7;
    flex: 1;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 6;
    -webkit-box-orient: vertical;
    white-space: pre-wrap;
  }

  .copy-btn {
    display: block;
    width: 100%;
    padding: 12px;
    background: #0A1410;
    color: var(--matrix-green);
    border: 1.5px solid rgba(0, 255, 102, 0.3);
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .copy-btn:hover { 
    background: var(--matrix-green);
    color: #000000;
    box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
    border-color: var(--matrix-green);
  }
  .copy-btn:active { transform: scale(0.98); }
  .copy-btn.copied { 
    background: #00FF66;
    color: #000000;
    border-color: #00FF66;
    box-shadow: 0 0 20px rgba(0, 255, 102, 0.5);
  }

  .loading {
    text-align: center;
    padding: 80px 20px;
    color: var(--matrix-green);
    font-family: 'Fira Code', monospace;
    font-size: 15px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border-color);
    border-top-color: var(--matrix-green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-family: 'Fira Code', monospace;
    font-size: 15px;
  }

  .count-badge {
    font-family: 'Fira Code', monospace;
    font-size: 11px;
    background: var(--matrix-green-glow);
    color: var(--matrix-green);
    padding: 1px 8px;
    border-radius: 4px;
    font-weight: 500;
    border: 1px solid rgba(0, 255, 102, 0.2);
  }

  /* Matrix 風格分類標籤顏色定義 (保留適度色差，但全面走暗色綠/冷色系) */
  .tag-content  { background: rgba(0, 255, 102, 0.08); color: #00FF66; border: 1px solid rgba(0, 255, 102, 0.2); }
  .tag-note     { background: rgba(56, 189, 248, 0.08); color: #38BDF8; border: 1px solid rgba(56, 189, 248, 0.2); }
  .tag-code     { background: rgba(34, 197, 94, 0.08);  color: #4ADE80; border: 1px solid rgba(34, 197, 94, 0.2); }
  .tag-slide    { background: rgba(45, 212, 191, 0.08); color: #2DD4BF; border: 1px solid rgba(45, 212, 191, 0.2); }
  .tag-gen      { background: rgba(0, 255, 102, 0.08); color: #00FF66; border: 1px solid rgba(0, 255, 102, 0.2); }
  .tag-text     { background: rgba(148, 163, 184, 0.08); color: #CBD5E1; border: 1px solid rgba(148, 163, 184, 0.2); }
  .tag-proof    { background: rgba(244, 63, 94, 0.08);   color: #FB7185; border: 1px solid rgba(244, 63, 94, 0.2); }
  .tag-project  { background: rgba(14, 165, 233, 0.08);  color: #38BDF8; border: 1px solid rgba(14, 165, 233, 0.2); }
  .tag-image    { background: rgba(20, 184, 166, 0.08);  color: #2DD4BF; border: 1px solid rgba(20, 184, 166, 0.2); }
  .tag-organize { background: rgba(16, 185, 129, 0.08);  color: #34D399; border: 1px solid rgba(16, 185, 129, 0.2); }
  .tag-info     { background: rgba(234, 179, 8, 0.08);   color: #FACC15; border: 1px solid rgba(234, 179, 8, 0.2); }
  .tag-mind     { background: rgba(249, 115, 22, 0.08);  color: #FB923C; border: 1px solid rgba(249, 115, 22, 0.2); }
  .tag-default  { background: rgba(71, 85, 105, 0.08);   color: #94A3B8; border: 1px solid rgba(71, 85, 105, 0.2); }
</style>
</head>
<body>

<div class="top-bar">
  <h1 class="site-title">> MATRIX_PROMPT_SYSTEM_</h1>
  <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/1Bpr4Dt4GhqbtOAdcUMiUHtv_VzsP369-Li-2R7p9XqQ/edit?gid=1480282197#gid=1480282197" target="_blank">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 3H6a2 2 0 00-2 2v14a2 2 0 002 2h12a2 2 0 002-2V10z"/><polyline points="14,3 14,10 21,10"/></svg>
    ACCESS_SOURCE_GOOGLE_SHEET
  </a>

  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="INITIALIZING SEARCH_...">
  </div>

  <div class="category-row" id="categoryRow">
    <button class="cat-btn active" data-cat="全部">全部</button>
  </div>
</div>

<div class="main">
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      LOADING_DATABASE_...
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1Bpr4Dt4GhqbtOAdcUMiUHtv_VzsP369-Li-2R7p9XqQ';
const GID = '1480282197';

const TAG_CLASS_MAP = {
  '內容創作': 'tag-content',
  '筆記精煉': 'tag-note',
  '程式應用': 'tag-code',
  '簡報表達': 'tag-slide',
  '程式生成': 'tag-gen',
  '文本優化': 'tag-text',
  '生文校正': 'tag-proof',
  '專案企劃': 'tag-project',
  '圖片生成': 'tag-image',
  '筆記整理': 'tag-organize',
  '資訊整理': 'tag-info',
  '心智圖法': 'tag-mind',
};

const SECTION_EMOJI = {
  'AI 協思': '🧠',
  '學習研究': '📚',
  '工作效率': '💼',
  '創意寫作': '✍️',
};

let allData = [];
let activeCategory = '全部';
let searchQuery = '';

function getTagClass(cat) {
  return TAG_CLASS_MAP[cat] || 'tag-default';
}

function parseCSV(text) {
  const rows = [];
  let i = 0;
  while (i < text.length) {
    const row = [];
    while (i < text.length && text[i] !== '\n') {
      if (text[i] === '"') {
        let cell = '';
        i++;
        while (i < text.length) {
          if (text[i] === '"' && text[i+1] === '"') { cell += '"'; i += 2; }
          else if (text[i] === '"') { i++; break; }
          else { cell += text[i++]; }
        }
        row.push(cell);
        if (text[i] === ',') i++;
      } else {
        let cell = '';
        while (i < text.length && text[i] !== ',' && text[i] !== '\n') cell += text[i++];
        row.push(cell);
        if (text[i] === ',') i++;
      }
    }
    if (text[i] === '\n') i++;
    if (row.some(c => c.trim())) rows.push(row);
  }
  return rows;
}

async function loadData() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('fetch failed');
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('no data');

    const headers = rows[0].map(h => h.trim());
    const items = rows.slice(1).map(row => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = (row[i] || '').trim(); });
      return obj;
    }).filter(item => Object.values(item).some(v => v));

    return items;
  } catch (e) {
    return null;
  }
}

function buildCategories(data) {
  const cats = new Set();
  data.forEach(item => {
    const cat = item['分類'] || item['category'] || item['Category'] || item['類別'] || '';
    if (cat) cats.add(cat);
  });
  return ['全部', ...Array.from(cats)];
}

function groupBySection(data) {
  const sections = {};
  data.forEach(item => {
    const sec = item['主題'] || item['section'] || item['Section'] || item['群組'] || item['group'] || 'AI 協思';
    if (!sections[sec]) sections[sec] = [];
    sections[sec].push(item);
  });
  return sections;
}

function getField(item, ...keys) {
  for (const k of keys) {
    if (item[k] !== undefined && item[k] !== '') return item[k];
  }
  return '';
}

function renderCard(item) {
  const title = getField(item, '標題', 'title', 'Title', '名稱');
  const prompt = getField(item, 'Prompt', 'prompt', '提示詞', '內容', 'content');
  const cat = getField(item, '分類', 'category', 'Category', '類別');
  const tagClass = getTagClass(cat);

  const card = document.createElement('div');
  card.className = 'prompt-card';
  card.dataset.cat = cat;
  card.dataset.title = title.toLowerCase();
  card.dataset.prompt = prompt.toLowerCase();

  card.innerHTML = `
    ${cat ? `<span class="card-tag ${tagClass}">${cat}</span>` : ''}
    ${title ? `<div class="card-title">${title}</div>` : ''}
    <div class="card-body">${prompt}</div>
    <button class="copy-btn" data-prompt="${prompt.replace(/"/g,'&quot;')}">RUN_COPY_PROMPT</button>
  `;

  card.querySelector('.copy-btn').addEventListener('click', function() {
    const text = this.getAttribute('data-prompt');
    navigator.clipboard.writeText(text).then(() => {
      this.textContent = '✓ COPIED_SUCCESS';
      this.classList.add('copied');
      setTimeout(() => {
        this.textContent = 'RUN_COPY_PROMPT';
        this.classList.remove('copied');
      }, 2000);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      this.textContent = '✓ COPIED_SUCCESS';
      this.classList.add('copied');
      setTimeout(() => { this.textContent = 'RUN_COPY_PROMPT'; this.classList.remove('copied'); }, 2000);
    });
  });

  return card;
}

function filterData() {
  return allData.filter(item => {
    const cat = getField(item, '分類', 'category', 'Category', '類別');
    const title = getField(item, '標題', 'title', 'Title', '名稱').toLowerCase();
    const prompt = getField(item, 'Prompt', 'prompt', '提示詞', '內容', 'content').toLowerCase();
    const matchCat = activeCategory === '全部' || cat === activeCategory;
    const q = searchQuery.toLowerCase();
    const matchSearch = !q || title.includes(q) || prompt.includes(q) || cat.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });
}

function render() {
  const content = document.getElementById('content');
  const filtered = filterData();

  if (filtered.length === 0) {
    content.innerHTML = '<div class="empty">😕 ERROR: NO_MATCHING_PROMPT_FOUND</div>';
    return;
  }

  const sections = groupBySection(filtered);
  content.innerHTML = '';

  Object.entries(sections).forEach(([sec, items]) => {
    const secEl = document.createElement('div');
    secEl.className = 'section';

    const emoji = SECTION_EMOJI[sec] || '📌';
    secEl.innerHTML = `
      <div class="section-title">
        <span>${emoji} ${sec}</span>
        <span class="count-badge">${items.length}</span>
      </div>
      <div class="card-grid"></div>
    `;

    const grid = secEl.querySelector('.card-grid');
    items.forEach(item => grid.appendChild(renderCard(item)));
    content.appendChild(secEl);
  });
}

async function init() {
  const data = await loadData();

  if (!data) {
    document.getElementById('content').innerHTML = `
      <div class="empty">
        ⚠️ CONNECTION_FAILED: 請確認 Google Sheet 已設為「任何人可檢視」<br>
        <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit?gid=${GID}" target="_blank" style="color:var(--matrix-green); text-decoration:none; margin-top:12px; display:inline-block;">RECONNECT_LINK ↗</a>
      </div>`;
    return;
  }

  allData = data;

  const cats = buildCategories(data);
  const catRow = document.getElementById('categoryRow');
  catRow.innerHTML = '';
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === '全部' ? ' active' : '');
    btn.dataset.cat = cat;
    btn.textContent = cat;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = cat;
      render();
    });
    catRow.appendChild(btn);
  });

  render();
}

document.getElementById('searchInput').addEventListener('input', function() {
  searchQuery = this.value;
  render();
});

init();
</script>
</body>
</html>
