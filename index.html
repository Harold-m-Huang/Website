<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ 終極提示詞寶庫</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* 核心闇黑科技配色 */
    --bg-main: #020204;       /* 極限深黑 */
    --bg-card: #070a0e;       /* 終端卡片黑，帶極深藍綠調 */
    --bg-input: #040609;      /* 輸入框暗黑 */
    --border-color: #0f241a;  /* 暗綠科技感邊框 */
    
    /* 經典螢光駭客綠與霓虹色系 */
    --matrix-green: #00ff66;       /* 主色：螢光綠 */
    --matrix-green-dim: #00cc52;   /* 次要：暗綠 */
    --matrix-green-glow: rgba(0, 255, 102, 0.15); /* 綠光暈 */
    --matrix-cyan: #00f0ff;        /* 科技青 */
    --matrix-red: #ff3b30;         /* 警告紅 */
    
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #475569;
  }

  body {
    font-family: 'Fira Code', 'Noto Sans TC', 'Plus Jakarta Sans', sans-serif;
    background-color: var(--bg-main);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* 科技掃描線效果 (最上層疊加) */
  body::before {
    content: " ";
    display: block;
    position: fixed;
    top: 0; left: 0; bottom: 0; right: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 255, 0, 0.06));
    z-index: 9999;
    background-size: 100% 4px, 6px 100%;
    pointer-events: none;
    opacity: 0.4;
  }

  /* Matrix 背景數位雨 Canvas (在內容後方) */
  #matrix-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    opacity: 0.15;
    pointer-events: none;
  }

  /* Matrix 前景黃金雨 Canvas (在內容前方，穿透所有元件) */
  #matrix-fg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 9998; /* 低於掃描線的 9999，但高於一切主要內容 */
    pointer-events: none; /* 極重要：穿透滑鼠事件，讓下方的按鈕、文字仍能被點擊選取 */
  }

  /* 網格網線背景 */
  .grid-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-size: 40px 40px;
    background-image: 
      linear-gradient(to right, rgba(0, 255, 102, 0.02) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(0, 255, 102, 0.02) 1px, transparent 1px);
    z-index: -1;
    pointer-events: none;
  }

  .top-bar {
    padding: 70px 24px 20px;
    text-align: center;
    position: relative;
    max-width: 1000px;
    margin: 0 auto;
  }

  /* 終端機裝飾角落 */
  .decor-corner {
    position: absolute;
    width: 16px;
    height: 16px;
    border: 2px solid var(--matrix-green-dim);
    pointer-events: none;
    opacity: 0.5;
  }
  .corner-tl { top: 20px; left: 24px; border-right: none; border-bottom: none; }
  .corner-tr { top: 20px; right: 24px; border-left: none; border-bottom: none; }
  .corner-bl { bottom: 20px; left: 24px; border-right: none; border-top: none; }
  .corner-br { bottom: 20px; right: 24px; border-left: none; border-top: none; }

  .site-title {
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 8px;
    color: var(--matrix-green);
    text-shadow: 0 0 15px rgba(0, 255, 102, 0.6);
    display: inline-block;
    position: relative;
  }

  .site-title::after {
    content: '_';
    animation: blink 0.8s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .site-subtitle {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .sheet-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-secondary);
    text-decoration: none;
    margin-bottom: 35px;
    transition: all 0.2s;
    background: rgba(0, 255, 102, 0.03);
    padding: 6px 14px;
    border: 1px solid var(--border-color);
    border-radius: 4px;
  }
  .sheet-link:hover { 
    color: var(--matrix-green);
    border-color: var(--matrix-green);
    box-shadow: 0 0 10px rgba(0, 255, 102, 0.2);
    background: rgba(0, 255, 102, 0.08);
  }
  .sheet-link svg { width: 14px; height: 14px; }

  /* 搜尋區塊外框 */
  .search-container {
    max-width: 580px;
    margin: 0 auto 36px;
    position: relative;
  }

  .search-wrap {
    position: relative;
    border: 1.5px solid var(--border-color);
    background: var(--bg-input);
    border-radius: 4px;
    overflow: hidden;
    transition: all 0.3s ease;
  }

  .search-wrap::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; width: 100%; height: 1px;
    background: var(--matrix-green);
    transform: scaleX(0);
    transition: transform 0.3s ease;
  }

  .search-wrap:focus-within {
    border-color: var(--matrix-green);
    box-shadow: 0 0 20px rgba(0, 255, 102, 0.15);
  }

  .search-wrap:focus-within::before {
    transform: scaleX(1);
  }

  .search-wrap svg.search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--matrix-green-dim);
    width: 18px;
    height: 18px;
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    padding: 16px 48px 16px 48px;
    font-size: 15px;
    font-family: inherit;
    border: none;
    background: transparent;
    color: var(--matrix-green);
    outline: none;
  }
  #searchInput::placeholder { color: var(--text-muted); }

  /* 清除按鈕 */
  .clear-btn {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    transition: color 0.2s;
  }
  .clear-btn:hover { color: var(--matrix-green); }
  .clear-btn svg { width: 18px; height: 18px; }

  /* 雙重選單面板 (Console Dashboard) */
  .filter-panel {
    max-width: 1000px;
    margin: 0 auto 32px;
    background: rgba(7, 10, 14, 0.6);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 20px;
    text-align: left;
    backdrop-filter: blur(8px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .filter-row {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 12px 0;
  }

  .filter-row:not(:last-child) {
    border-bottom: 1px dashed rgba(0, 255, 102, 0.1);
  }

  .filter-label {
    font-family: 'Fira Code', monospace;
    font-size: 12px;
    font-weight: bold;
    color: var(--matrix-cyan);
    min-width: 130px;
    padding-top: 8px;
    letter-spacing: 1px;
    text-shadow: 0 0 5px rgba(0, 240, 255, 0.3);
  }

  .filter-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .cat-btn {
    padding: 6px 14px;
    border-radius: 4px;
    font-size: 12.5px;
    font-family: inherit;
    font-weight: 500;
    border: 1px solid var(--border-color);
    background: var(--bg-input);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .cat-btn:hover {
    border-color: var(--matrix-green-dim);
    color: var(--matrix-green);
    background: rgba(0, 255, 102, 0.02);
  }

  .cat-btn.active {
    background: var(--matrix-green-glow);
    border-color: var(--matrix-green);
    color: var(--matrix-green);
    box-shadow: 0 0 10px rgba(0, 255, 102, 0.15);
  }

  .btn-count {
    font-family: 'Fira Code', monospace;
    font-size: 10px;
    background: rgba(255, 255, 255, 0.05);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--text-muted);
    transition: all 0.2s;
  }

  .cat-btn.active .btn-count {
    background: rgba(0, 255, 102, 0.2);
    color: var(--matrix-green);
  }

  .main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 24px 80px;
    position: relative;
  }

  /* 顯示當前過濾狀態 */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    font-family: 'Fira Code', monospace;
    font-size: 13px;
    color: var(--text-secondary);
    border-bottom: 1.5px solid var(--border-color);
    padding-bottom: 10px;
  }

  .status-info span {
    color: var(--matrix-green);
    font-weight: bold;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 24px;
  }

  /* 科技卡片樣式 */
  .prompt-card {
    background: var(--bg-card);
    border-radius: 4px;
    border: 1.5px solid var(--border-color);
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    position: relative;
    overflow: hidden;
  }
  
  /* 卡片裝飾：右上角微型高亮角 */
  .prompt-card::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 10px 10px 0;
    border-color: transparent var(--border-color) transparent transparent;
    transition: border-color 0.3s;
  }

  .prompt-card:hover {
    box-shadow: 0 12px 35px rgba(0, 0, 0, 0.9), 0 0 20px rgba(0, 255, 102, 0.08);
    transform: translateY(-5px);
    border-color: var(--matrix-green);
  }
  .prompt-card:hover::after {
    border-color: transparent var(--matrix-green) transparent transparent;
  }

  .card-header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }

  .card-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    font-family: 'Fira Code', monospace;
  }

  .card-sec-badge {
    font-family: 'Fira Code', monospace;
    font-size: 11px;
    color: var(--matrix-cyan);
    background: rgba(0, 240, 255, 0.06);
    border: 1px solid rgba(0, 240, 255, 0.2);
    padding: 2px 8px;
    border-radius: 3px;
  }

  .card-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.4;
    letter-spacing: 0.5px;
  }

  .card-body-wrapper {
    position: relative;
    flex: 1;
  }

  .card-body {
    font-size: 13.5px;
    color: var(--text-secondary);
    line-height: 1.75;
    white-space: pre-wrap;
    max-height: 160px;
    overflow-y: auto;
    padding-right: 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--border-color) transparent;
  }

  /* 自訂滾動條 */
  .card-body::-webkit-scrollbar {
    width: 4px;
  }
  .card-body::-webkit-scrollbar-track {
    background: transparent;
  }
  .card-body::-webkit-scrollbar-thumb {
    background-color: var(--border-color);
    border-radius: 2px;
  }
  .prompt-card:hover .card-body::-webkit-scrollbar-thumb {
    background-color: var(--matrix-green-dim);
  }

  /* 底部按鈕區 */
  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: auto;
  }

  .copy-btn, .view-btn {
    padding: 11px;
    background: rgba(0, 255, 102, 0.02);
    color: var(--matrix-green);
    border: 1px solid rgba(0, 255, 102, 0.2);
    border-radius: 4px;
    font-size: 13px;
    font-family: 'Fira Code', monospace;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .copy-btn { flex: 2; }
  .view-btn { flex: 1; color: var(--matrix-cyan); border-color: rgba(0, 240, 255, 0.2); background: rgba(0, 240, 255, 0.01); }

  .copy-btn:hover { 
    background: var(--matrix-green);
    color: #000000;
    box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
    border-color: var(--matrix-green);
  }
  .view-btn:hover {
    background: var(--matrix-cyan);
    color: #000000;
    box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
    border-color: var(--matrix-cyan);
  }

  .copy-btn:active, .view-btn:active { transform: scale(0.97); }
  
  .copy-btn.copied { 
    background: #00FF66;
    color: #000000;
    border-color: #00FF66;
    box-shadow: 0 0 25px rgba(0, 255, 102, 0.6);
  }

  /* 終端加載動畫 */
  .loading {
    text-align: center;
    padding: 100px 20px;
    color: var(--matrix-green);
    font-family: 'Fira Code', monospace;
    font-size: 15px;
    letter-spacing: 2px;
  }
  
  .terminal-loader {
    width: 60px;
    height: 12px;
    background: linear-gradient(90deg, var(--matrix-green) 33%, transparent 0, transparent 66%, var(--matrix-green) 0);
    background-size: 40px 100%;
    animation: loader-slide 0.8s infinite linear;
    margin: 0 auto 24px;
    border: 1px solid var(--matrix-green-dim);
  }

  @keyframes loader-slide {
    to { background-position: 40px 0; }
  }

  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--matrix-red);
    font-family: 'Fira Code', monospace;
    font-size: 15px;
    border: 1.5px dashed rgba(255, 59, 48, 0.3);
    background: rgba(255, 59, 48, 0.02);
    border-radius: 4px;
    max-width: 600px;
    margin: 40px auto;
  }

  .count-badge {
    font-family: 'Fira Code', monospace;
    font-size: 11px;
    background: var(--matrix-green-glow);
    color: var(--matrix-green);
    padding: 2px 8px;
    border-radius: 3px;
    font-weight: 500;
    border: 1px solid rgba(0, 255, 102, 0.2);
  }

  /* Matrix 風格分類標籤顏色 */
  .tag-content  { background: rgba(0, 255, 102, 0.08); color: #00FF66; border: 1px solid rgba(0, 255, 102, 0.3); }
  .tag-note     { background: rgba(56, 189, 248, 0.08); color: #38BDF8; border: 1px solid rgba(56, 189, 248, 0.3); }
  .tag-code     { background: rgba(34, 197, 94, 0.08);  color: #4ADE80; border: 1px solid rgba(34, 197, 94, 0.3); }
  .tag-slide    { background: rgba(45, 212, 191, 0.08); color: #2DD4BF; border: 1px solid rgba(45, 212, 191, 0.3); }
  .tag-gen      { background: rgba(0, 255, 102, 0.08); color: #00FF66; border: 1px solid rgba(0, 255, 102, 0.3); }
  .tag-text     { background: rgba(148, 163, 184, 0.08); color: #CBD5E1; border: 1px solid rgba(148, 163, 184, 0.3); }
  .tag-proof    { background: rgba(244, 63, 94, 0.08);   color: #FB7185; border: 1px solid rgba(244, 63, 94, 0.3); }
  .tag-project  { background: rgba(14, 165, 233, 0.08);  color: #38BDF8; border: 1px solid rgba(14, 165, 233, 0.3); }
  .tag-image    { background: rgba(20, 184, 166, 0.08);  color: #2DD4BF; border: 1px solid rgba(20, 184, 166, 0.3); }
  .tag-organize { background: rgba(16, 185, 129, 0.08);  color: #34D399; border: 1px solid rgba(16, 185, 129, 0.3); }
  .tag-info     { background: rgba(234, 179, 8, 0.08);   color: #FACC15; border: 1px solid rgba(234, 179, 8, 0.3); }
  .tag-mind     { background: rgba(249, 115, 22, 0.08);  color: #FB923C; border: 1px solid rgba(249, 115, 22, 0.3); }
  .tag-default  { background: rgba(71, 85, 105, 0.08);   color: #94A3B8; border: 1px solid rgba(71, 85, 105, 0.3); }

  /* 彈出視窗（終端面板大圖模式） */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(2, 2, 4, 0.85);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    padding: 20px;
  }

  .modal-container {
    background: #0a0d14;
    border: 2px solid var(--matrix-green);
    border-radius: 4px;
    width: 100%;
    max-width: 800px;
    box-shadow: 0 0 35px rgba(0, 255, 102, 0.25);
    position: relative;
    display: flex;
    flex-direction: column;
    max-height: 85vh;
  }

  .modal-header {
    padding: 16px 24px;
    border-bottom: 1.5px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0, 255, 102, 0.02);
  }

  .modal-title {
    font-size: 1.2rem;
    font-weight: 700;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .modal-close {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 20px;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--matrix-red); }

  .modal-body {
    padding: 24px;
    overflow-y: auto;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text-primary);
    white-space: pre-wrap;
    font-family: inherit;
    flex: 1;
  }

  .modal-footer {
    padding: 16px 24px;
    border-top: 1.5px solid var(--border-color);
    display: flex;
    justify-content: flex-end;
    gap: 12px;
  }

  /* 提示詞彈出通知 */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 10001;
    pointer-events: none;
  }

  .toast {
    background: #05070b;
    border: 1.5px solid var(--matrix-green);
    color: var(--matrix-green);
    padding: 14px 24px;
    border-radius: 4px;
    font-family: 'Fira Code', monospace;
    font-size: 13px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.8), 0 0 15px rgba(0, 255, 102, 0.2);
    display: flex;
    align-items: center;
    gap: 10px;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }
</style>
</head>
<body>

<!-- 數位背景與前景 Canvas -->
<canvas id="matrix-bg"></canvas>
<canvas id="matrix-fg"></canvas>
<div class="grid-overlay"></div>

<div class="top-bar">
  <!-- 科技感定位邊角 -->
  <div class="decor-corner corner-tl"></div>
  <div class="decor-corner corner-tr"></div>
  <div class="decor-corner corner-bl"></div>
  <div class="decor-corner corner-br"></div>

  <h1 class="site-title">> 終極提示詞寶庫</h1>
  <div class="site-subtitle">TERMINAL PROMPT MATRIX</div>
  
  <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/1Bpr4Dt4GhqbtOAdcUMiUHtv_VzsP369-Li-2R7p9XqQ/edit?gid=1480282197#gid=1480282197" target="_blank">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 3H6a2 2 0 00-2 2v14a2 2 0 002 2h12a2 2 0 002-2V10z"/><polyline points="14,3 14,10 21,10"/></svg>
    ACCESS_SOURCE_GOOGLE_SHEET ↗
  </a>

  <!-- 搜尋控制台 -->
  <div class="search-container">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="INITIALIZE SEARCH_QUERY_...">
      <button class="clear-btn" id="clearSearch">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <!-- 雙重過濾主控制面板 (Dual Filtering Panel) -->
  <div class="filter-panel">
    <!-- 第一重：Type/主題 -->
    <div class="filter-row">
      <div class="filter-label">[SELECT_TYPE] :</div>
      <div class="filter-buttons" id="typeRow">

<script>
const SHEET_ID = '1Bpr4Dt4GhqbtOAdcUMiUHtv_VzsP369-Li-2R7p9XqQ';
const GID = '1480282197';

const TAG_CLASS_MAP = {
  '內容創作': 'tag-content',
  '筆記精煉': 'tag-note',
  '程式應用': 'tag-code',
  '簡報表達': 'tag-slide',
  '程式生成': 'tag-gen',
  '文本優化': 'tag-text',
  '生文校正': 'tag-proof',
  '專案企劃': 'tag-project',
  '圖片生成': 'tag-image',
  '筆記整理': 'tag-organize',
  '資訊整理': 'tag-info',
  '心智圖法': 'tag-mind',
};

let allData = [];
let activeSection = '全部';  // 第一重選單：主題 / Type
let activeCategory = '全部'; // 第二重選單：分類 / Category
let searchQuery = '';

/* ==================== Background & Foreground Matrix Digital Rain ==================== */
const canvasBg = document.getElementById('matrix-bg');
const ctxBg = canvasBg.getContext('2d');
const canvasFg = document.getElementById('matrix-fg');
const ctxFg = canvasFg.getContext('2d');

let columns = [];
const fontSize = 14;

// 精心設計的字元集合：注音、英文字母、阿拉伯數字、日文平假名、日文片假名
const zhuyin = 'ㄅㄆㄇㄈㄉㄊㄋㄌㄍㄎㄏㄐㄑㄒㄓㄔㄕㄖㄗㄘㄙㄚㄛㄜㄝㄞㄟㄠㄡㄢㄣㄤㄥㄦㄧㄨㄩ';
const english = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
const numbers = '0123456789';
const hiragana = 'あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをん';
const katakana = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
const charPool = zhuyin + english + numbers + hiragana + katakana;

function initMatrix() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  
  canvasBg.width = w;
  canvasBg.height = h;
  canvasFg.width = w;
  canvasFg.height = h;
  
  const colCount = Math.floor(w / fontSize) + 1;
  columns = [];
  for (let i = 0; i < colCount; i++) {
    columns.push({
      x: i * fontSize,
      y: Math.random() * -h,
      speed: 0.5 + Math.random() * 8.5, // 速度差異
      opacity: 0.15 + Math.random() * 0.85, // 隨機綠色雨滴明暗度
      isGolden: false, // 是否為特殊黃金雨滴
      goldHistory: [] // 用於儲存前景黃金雨滴的歷史殘影軌跡
    });
  }
}

// 追蹤上一次產生黃金雨滴的時間
let lastGoldTime = Date.now();
// 隨機產生下一次黃金雨滴出現的冷卻間隔 (3000 ~ 5000 毫秒)
let goldInterval = 3000 + Math.random() * 2000;

function drawMatrix() {
  // 1. 清除背景 Canvas，用帶有尾跡深度的 semi-transparent 黑色填滿
  ctxBg.fillStyle = 'rgba(2, 2, 4, 0.14)';
  ctxBg.fillRect(0, 0, canvasBg.width, canvasBg.height);

  // 2. 徹底清除前景 Canvas（因為前景完全透明，不能用填滿黑色的方式產生殘影）
  ctxFg.clearRect(0, 0, canvasFg.width, canvasFg.height);

  // 3. 定期觸發前景黃金雨滴產生機制
  if (Date.now() - lastGoldTime > goldInterval) {
    const randomCol = columns[Math.floor(Math.random() * columns.length)];
    if (randomCol && !randomCol.isGolden) {
      randomCol.isGolden = true;
      randomCol.speed = 4.5 + Math.random() * 3.5; // 黃金雨滴的速度稍微快且穩定一些
      randomCol.y = -80; // 從頂部更上方起跑
      randomCol.goldHistory = []; // 初始化軌跡紀錄
    }
    lastGoldTime = Date.now();
    // 每次觸發後重新隨機決定下一次的冷卻間隔 (3 到 5 秒)
    goldInterval = 3000 + Math.random() * 2000;
  }
  
  columns.forEach(col => {
    const text = charPool[Math.floor(Math.random() * charPool.length)];

    if (col.isGolden) {
      // ===== 前景黃金雨滴渲染機制 =====
      // 記錄此影格的位置與隨機字元
      col.goldHistory.push({ y: col.y, char: text });
      
      // 限制軌跡長度，長度 10 代表後面會有漂亮的手動漸暗光跡
      if (col.goldHistory.length > 10) {
        col.goldHistory.shift();
      }

      ctxFg.font = fontSize + 'px monospace';
      col.goldHistory.forEach((historyItem, index) => {
        // 光跡尾端最暗，最前方（頭部）完全不透明清晰
        const alpha = (index + 1) / col.goldHistory.length;
        ctxFg.fillStyle = `rgba(255, 215, 0, ${alpha})`;

        // 只讓最前方（最後加入陣列）的雨滴頭部具有霓虹外發光，防止整條光跡太刺眼
        if (index === col.goldHistory.length - 1) {
          ctxFg.shadowBlur = 15;
          ctxFg.shadowColor = '#FFE700';
        } else {
          ctxFg.shadowBlur = 0;
        }
        ctxFg.fillText(historyItem.char, col.x, historyItem.y);
      });
      // 重置發光設定，避免影響其他前景繪製
      ctxFg.shadowBlur = 0;

    } else {
      // ===== 背景綠色雨滴渲染機制 =====
      ctxBg.font = fontSize + 'px monospace';
      ctxBg.fillStyle = `rgba(0, 255, 102, ${col.opacity})`;
      ctxBg.fillText(text, col.x, col.y);
    }

    // 更新垂直下墬位置
    col.y += col.speed;

    // 當雨滴超過畫布底部，重置回最上方並還原狀態
    if (col.y > canvasBg.height) {
      col.y = -50;
      col.speed = 0.5 + Math.random() * 8.5;
      col.opacity = 0.15 + Math.random() * 0.85;
      col.isGolden = false;
      col.goldHistory = []; // 清空殘影
    }
  });
}

window.addEventListener('resize', initMatrix);
initMatrix();
setInterval(drawMatrix, 33);


/* ==================== 貼心通知 (Toast & Modal) ==================== */
const toast = document.getElementById('toast');
const toastMsg = document.getElementById('toastMsg');
function showToast(msg) {
  toastMsg.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => {
    toast.classList.remove('show');
  }, 2500);
}

const modal = document.getElementById('promptModal');
const modalBody = document.getElementById('modalBody');
const modalCopyBtn = document.getElementById('modalCopyBtn');
let currentModalPromptText = "";

function openModal(title, text) {
  modalBody.textContent = text;
  document.querySelector('.modal-title').textContent = `> ${title}`;
  currentModalPromptText = text;
  modal.style.display = 'flex';
}

document.getElementById('modalClose').addEventListener('click', () => {
  modal.style.display = 'none';
});

modal.addEventListener('click', (e) => {
  if (e.target === modal) modal.style.display = 'none';
});

modalCopyBtn.addEventListener('click', () => {
  copyText(currentModalPromptText, modalCopyBtn);
});


/* ==================== 資料載入與解析 ==================== */
function getTagClass(cat) {
  return TAG_CLASS_MAP[cat] || 'tag-default';
}

function parseCSV(text) {
  const rows = [];
  let i = 0;
  while (i < text.length) {
    const row = [];
    while (i < text.length && text[i] !== '\n') {
      if (text[i] === '"') {
        let cell = '';
        i++;
        while (i < text.length) {
          if (text[i] === '"' && text[i+1] === '"') { cell += '"'; i += 2; }
          else if (text[i] === '"') { i++; break; }
          else { cell += text[i++]; }
        }
        row.push(cell);
        if (text[i] === ',') i++;
      } else {
        let cell = '';
        while (i < text.length && text[i] !== ',' && text[i] !== '\n') cell += text[i++];
        row.push(cell);
        if (text[i] === ',') i++;
      }
    }
    if (text[i] === '\n') i++;
    if (row.some(c => c.trim())) rows.push(row);
  }
  return rows;
}

async function loadData() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('fetch failed');
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('no data');

    const headers = rows[0].map(h => h.trim());
    const items = rows.slice(1).map(row => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = (row[i] || '').trim(); });
      return obj;
    }).filter(item => Object.values(item).some(v => v));

    return items;
  } catch (e) {
    return null;
  }
}

function getField(item, ...keys) {
  for (const k of keys) {
    if (item[k] !== undefined && item[k] !== '') return item[k];
  }
  return '';
}

/* ==================== 動態雙重連動過濾清單生成 ==================== */

// 當 activeCategory 改變時，計算可用的主題 (Type/Section) 清單
function getAvailableSections() {
  if (activeCategory === '全部') {
    const sections = new Set();
    allData.forEach(item => {
      const sec = getField(item, '主題', 'type', 'Type', 'section', 'Section', '群組', 'group');
      if (sec && sec.trim()) sections.add(sec.trim());
    });
    return ['全部', ...Array.from(sections)];
  } else {
    const sections = new Set();
    allData.forEach(item => {
      const cat = getField(item, '分類', 'category', 'Category', '類別');
      if (cat === activeCategory) {
        const sec = getField(item, '主題', 'type', 'Type', 'section', 'Section', '群組', 'group');
        if (sec && sec.trim()) sections.add(sec.trim());
      }
    });
    return ['全部', ...Array.from(sections)];
  }
}

// 當 activeSection 改變時，計算可用的分類 (Category) 清單
function getAvailableCategories() {
  if (activeSection === '全部') {
    const categories = new Set();
    allData.forEach(item => {
      const cat = getField(item, '分類', 'category', 'Category', '類別');
      if (cat && cat.trim()) categories.add(cat.trim());
    });
    return ['全部', ...Array.from(categories)];
  } else {
    const categories = new Set();
    allData.forEach(item => {
      const sec = getField(item, '主題', 'type', 'Type', 'section', 'Section', '群組', 'group');
      if (sec === activeSection) {
        const cat = getField(item, '分類', 'category', 'Category', '類別');
        if (cat && cat.trim()) categories.add(cat.trim());
      }
    });
    return ['全部', ...Array.from(categories)];
  }
}


/* ==================== 複製功能 ==================== */
function copyText(text, btnElement) {
  const fallbackCopy = (txt) => {
    const ta = document.createElement('textarea');
    ta.value = txt;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
      onCopySuccess();
    } catch (err) {
      showToast('❌ COPY_FAILED');
    }
    document.body.removeChild(ta);
  };

  const onCopySuccess = () => {
    showToast('✓ COPIED_TO_CLIPBOARD');
    const origText = btnElement.textContent;
    btnElement.textContent = '✓ COPIED_SUCCESS';
    btnElement.classList.add('copied');
    setTimeout(() => {
      btnElement.textContent = origText;
      btnElement.classList.remove('copied');
    }, 2000);
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(onCopySuccess)
      .catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

/* ==================== 渲染卡片 ==================== */
function renderCard(item) {
  const title = getField(item, '標題', 'title', 'Title', '名稱');
  const prompt = getField(item, 'Prompt', 'prompt', '提示詞', '內容', 'content');
  const cat = getField(item, '分類', 'category', 'Category', '類別');
  const sec = getField(item, '主題', 'type', 'Type', 'section', 'Section', '群組', 'group') || '預設';
  const tagClass = getTagClass(cat);

  const card = document.createElement('div');
  card.className = 'prompt-card';
  card.dataset.cat = cat;
  card.dataset.title = title.toLowerCase();
  card.dataset.prompt = prompt.toLowerCase();

  card.innerHTML = `
    <div class="card-header-row">
      ${cat ? `<span class="card-tag ${tagClass}">${cat}</span>` : '<span></span>'}
      <span class="card-sec-badge">${sec}</span>
    </div>
    ${title ? `<div class="card-title">${title}</div>` : ''}
    <div class="card-body-wrapper">
      <div class="card-body">${prompt}</div>
    </div>
    <div class="card-actions">
      <button class="copy-btn" data-prompt="${prompt.replace(/"/g,'&quot;')}">RUN_COPY_PROMPT</button>
      <button class="view-btn" title="展開完整檢視">VIEW</button>
    </div>
  `;

  card.querySelector('.copy-btn').addEventListener('click', function(e) {
    e.stopPropagation();
    const text = this.getAttribute('data-prompt');
    copyText(text, this);
  });

  card.querySelector('.view-btn').addEventListener('click', function(e) {
    e.stopPropagation();
    openModal(title || 'PROMPT_DETAIL', prompt);
  });

  return card;
}

/* ==================== 雙重過濾 ==================== */
function filterData() {
  return allData.filter(item => {
    const cat = getField(item, '分類', 'category', 'Category', '類別');
    const sec = getField(item, '主題', 'type', 'Type', 'section', 'Section', '群組', 'group');
    const title = getField(item, '標題', 'title', 'Title', '名稱').toLowerCase();
    const prompt = getField(item, 'Prompt', 'prompt', '提示詞', '內容', 'content').toLowerCase();

    const matchSec = activeSection === '全部' || sec === activeSection;
    const matchCat = activeCategory === '全部' || cat === activeCategory;

    const q = searchQuery.toLowerCase();
    const matchSearch = !q || title.includes(q) || prompt.includes(q) || cat.toLowerCase().includes(q) || sec.toLowerCase().includes(q);

    return matchSec && matchCat && matchSearch;
  });
}

/* ==================== 渲染畫面 ==================== */
function render() {
  const content = document.getElementById('content');
  const filtered = filterData();

  // 更新上方狀態欄
  document.getElementById('statusType').textContent = activeSection;
  document.getElementById('statusClass').textContent = activeCategory;
  document.getElementById('statusCount').textContent = `${filtered.length} UNITS`;

  if (filtered.length === 0) {
    content.innerHTML = `
      <div class="empty">
        ⚠️ ERROR: NO_MATCHING_PROMPT_FOUND 
        <br><span style="font-size: 12px; margin-top: 8px; display: inline-block; color: var(--text-secondary);">請重新調整雙重選單或搜尋關鍵字。</span>
      </div>`;
    return;
  }

  content.innerHTML = '';
  
  const grid = document.createElement('div');
  grid.className = 'card-grid';
  
  filtered.forEach(item => grid.appendChild(renderCard(item)));
  content.appendChild(grid);
}

/* ==================== 實時計算在當前選取條件下，按鈕能匹配出的項目數 ==================== */
function getCountOfSection(sec) {
  return allData.filter(item => {
    const itemSec = getField(item, '主題', 'type', 'Type', 'section', 'Section', '群組', 'group');
    const itemCat = getField(item, '分類', 'category', 'Category', '類別');
    const matchSec = sec === '全部' || itemSec === sec;
    const matchCat = activeCategory === '全部' || itemCat === activeCategory;
    return matchSec && matchCat;
  }).length;
}

function getCountOfCategory(cat) {
  return allData.filter(item => {
    const itemSec = getField(item, '主題', 'type', 'Type', 'section', 'Section', '群組', 'group');
    const itemCat = getField(item, '分類', 'category', 'Category', '類別');
    const matchSec = activeSection === '全部' || itemSec === activeSection;
    const matchCat = cat === '全部' || itemCat === cat;
    return matchSec && matchCat;
  }).length;
}

/* ==================== 雙重過濾選單連動渲染的核心控制機制 ==================== */
function updateFiltersAndRender() {
  // 1. 取得當前關聯可用的主題清單
  const availableSections = getAvailableSections();
  // 萬一先前選中的主題不在新的候選名單中，自動回歸「全部」
  if (!availableSections.includes(activeSection)) {
    activeSection = '全部';
  }

  // 2. 取得當前關聯可用的分類清單
  const availableCategories = getAvailableCategories();
  // 萬一先前選中的分類不在新的候選名單中，自動回歸「全部」
  if (!availableCategories.includes(activeCategory)) {
    activeCategory = '全部';
  }

  // 3. 渲染第一重主題按鈕 (依據 activeCategory 來決定要顯示哪些 Type 按鈕)
  const typeRow = document.getElementById('typeRow');
  typeRow.innerHTML = '';
  availableSections.forEach(sec => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (sec === activeSection ? ' active' : '');
    
    const count = getCountOfSection(sec);
    btn.innerHTML = `${sec} <span class="btn-count">${count}</span>`;
    
    btn.addEventListener('click', () => {
      activeSection = sec;
      updateFiltersAndRender();
    });
    typeRow.appendChild(btn);
  });

  // 4. 渲染第二重分類按鈕 (依據 activeSection 來決定要顯示哪些 Category 按鈕)
  const categoryRow = document.getElementById('categoryRow');
  categoryRow.innerHTML = '';
  availableCategories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === activeCategory ? ' active' : '');
    
    const count = getCountOfCategory(cat);
    btn.innerHTML = `${cat} <span class="btn-count">${count}</span>`;
    
    btn.addEventListener('click', () => {
      activeCategory = cat;
      updateFiltersAndRender();
    });
    categoryRow.appendChild(btn);
  });

  // 5. 輸出符合雙重條件的提示詞卡片
  render();
}

/* ==================== 頁面初始控制 ==================== */
async function init() {
  const data = await loadData();

  if (!data) {
    document.getElementById('content').innerHTML = `
      <div class="empty" style="border-color: var(--matrix-red);">
        ⚠️ CONNECTION_FAILED: 無法存取資料母體。<br>
        <span style="font-size:12.5px; color: var(--text-secondary); display:block; margin: 10px 0;">請確認您的 Google Sheet 已設定為「任何人可檢視」或再次嘗試連接。</span>
        <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit?gid=${GID}" target="_blank" style="color:var(--matrix-green); text-decoration:none; font-weight: bold; margin-top:12px; display:inline-block;">[ RECONNECT_SOURCE_LINK ↗ ]</a>
      </div>`;
    return;
  }

  allData = data;

  // 使用連動控制機制進行初始渲染
  updateFiltersAndRender();
}

/* ==================== 搜尋輸入交互處理 ==================== */
const searchInput = document.getElementById('searchInput');
const clearSearch = document.getElementById('clearSearch');

searchInput.addEventListener('input', function() {
  searchQuery = this.value;
  if (searchQuery.trim().length > 0) {
    clearSearch.style.display = 'flex';
  } else {
    clearSearch.style.display = 'none';
  }
  render(); // 搜尋不主動隱藏分類按鈕，維持按鈕資料完整性，僅針對下方的網格做實時文字快篩
});

clearSearch.addEventListener('click', function() {
  searchInput.value = '';
  searchQuery = '';
  clearSearch.style.display = 'none';
  searchInput.focus();
  render();
});

init();
</script>
